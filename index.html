<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu</title>
</head>
<body>
    <div>
        <select name="" id="selectId">
            <option value="İstanbul">İstanbul</option>
            <option  value="Ankara">Ankara</option>
        </select>
    </div>
    <div>
        <Button id="buttonId">Şehir seç</Button>
    </div>
    <div>
        <p id="pId">Hava Durumu:</p>
    </div>
    <script>
        const button=document.getElementById("buttonId");
        button.addEventListener("click",async()=>{ //api'den veri çekiyoruz veri çekiminde beklememek için
            const sehirSecimi=document.getElementById("selectId");
            const sonucMetni=document.getElementById("pId");
            const secilenSehir=sehirSecimi.value;
            console.log(`Seçilen şehir:${secilenSehir}`);
            const url = `https://api.open-meteo.com/v1/forecast?latitude=41.01&longitude=28.97&current_weather=true`;
            const res=await fetch(url);
            const data=await res.json();
            console.log("Api üzerinden gelen veri:",data);
            const sicaklikDegeri=data.current_weather.temperature;
            document.getElementById("pId").innerHTML="Sicaklik:"+sicaklikDegeri;
        })
    </script>
</body>
</html>
